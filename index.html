<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Masiha 💜</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
  text-align: center;
}

/* Intro */
#intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 15px 25px;
  border-radius: 30px;
  border: none;
  background: #8a2be2;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: #a64dff;
}

#main {
  display: none;
  padding: 20px;
}

h1 {
  font-size: 40px;
  color: #d9b3ff;
}

/* Photos */
.gallery img {
  width: 220px;
  margin: 10px;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(138,43,226,0.6);
}

/* Reasons */
.reason {
  background: rgba(255,255,255,0.1);
  margin: 10px auto;
  padding: 10px;
  width: 70%;
  border-radius: 15px;
}

/* Secret */
#secret {
  display: none;
  margin-top: 20px;
  font-size: 22px;
  color: #ffccff;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: purple;
  top: 0;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h2>Hey Masiha 👀</h2>
  <p>I made something special for you...</p>
  <button onclick="start()">Open Your Surprise 🎁</button>
</div>

<!-- MAIN -->
<div id="main">

  <h1>Happy Birthday Masiha 💜</h1>
  <p>You mean so much to me 🥺</p>

  <!-- PHOTOS -->
  <div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>

  <!-- SONG -->
  <h2>Our Song 🎶</h2>
  <iframe width="300" height="170"
    src="https://www.youtube.com/embed/8of5w7RgcTc"
    frameborder="0" allowfullscreen>
  </iframe>

  <!-- REASONS -->
  <h2>Why I Love You 💕</h2>
  <div class="reason">Your extrovert nature</div>
  <div class="reason">Motivating yourself</div>
  <div class="reason">Talkative (and I love it 😂)</div>

  <!-- SECRET -->
  <button onclick="showSecret()">Click me 👀</button>
  <div id="secret">
    you have special place in my heart 💜
  </div>

</div>

<script>
function start() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
  startConfetti();
}

function showSecret() {
  document.getElementById("secret").style.display = "block";
}

/* Confetti */
function startConfetti() {
  for (let i = 0; i < 50; i++) {
    let confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
    confetti.style.backgroundColor =
      ["#8a2be2", "#ff66ff", "#cc99ff"][Math.floor(Math.random()*3)];
    document.body.appendChild(confetti);
  }
}
</script>

</body>
</html>
